<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlueWave Messenger</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="auth">
        <div class="login-card">
            <div class="avatar-container">
                <div class="blue-icon-box">
                    <img src="logo.png" alt="Ship">
                </div>
            </div>
            <h1 class="brand-name">BlueWave</h1>
            <p class="welcome-text" id="form-subtitle">Добро пожаловать в мессенджер</p>
            <div class="auth-fields">
                <input type="text" id="username" placeholder="Логин (например, admin)" autocomplete="off">
                <input type="password" id="password" placeholder="Пароль (например, 1234)">
                <button id="main-btn" class="btn-primary">ВОЙТИ</button>
            </div>
            <p class="toggle-mode">
                <span id="toggle-text">Нет аккаунта?</span> 
                <span id="toggle-link">Зарегистрироваться</span>
            </p>
        </div>
    </div>

    <div id="chat" style="display: none;">
        <div class="app-container">
            <div class="sidebar">
                <div class="sidebar-header">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <h3 style="color: #0056b3;">BlueWave</h3>
                        <div id="settings-btn" style="cursor: pointer; font-size: 20px;">⚙️</div>
                    </div>
                    <div id="my-id-display" style="font-size: 11px; color: #007bff; margin-top: 5px;">Ваш ID: ...</div>
                    <input type="text" id="search-input" placeholder="Поиск в контактах..." style="margin-top: 10px;">
                </div>
                <div class="section-title">Группы</div>
                <div class="user-item group-item" id="global-group">
                    <div class="mini-cube" style="background: #00c853;"></div> 
                    <span>BlueWave Group</span>
                </div>
                <div class="section-title">Контакты</div>
                <div id="user-list"></div>
            </div>
            <div class="chat-main">
                <div class="chat-header">
                    <span id="target-user-name">Выберите чат</span>
                </div>
                <div id="messages">
                    <div id="chat-welcome" style="text-align: center; margin-top: 50px; color: #888;">Выберите чат для начала общения</div>
                </div>
                <div class="message-input-area" id="input-panel" style="display: none;">
                    <input type="text" id="msg-input" placeholder="Введите сообщение...">
                    <button id="send-btn">Отправить</button>
                </div>
            </div>
        </div>
    </div>

    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <h4>Добавить контакт</h4>
            <input type="text" id="add-user-id" placeholder="Введите ID (6 символов)">
            <button id="confirm-add-btn" class="btn-primary">Добавить</button>
            <button id="close-settings" style="background: none; border: none; color: #888; cursor: pointer; margin-top: 10px;">Закрыть</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
