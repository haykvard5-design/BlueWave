<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlueWave Messenger</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="auth">
        <div class="login-card">
            <div class="avatar-container">
                <div class="blue-icon-box">
                    <img src="logo.png" alt="Ship">
                </div>
            </div>
            
            <h1 class="brand-name">BlueWave</h1>
            <p class="welcome-text" id="form-subtitle">Добро пожаловать в мессенджер</p>

            <div class="auth-fields">
                <input type="text" id="username" placeholder="Логин (например, admin)" autocomplete="off">
                <input type="password" id="password" placeholder="Пароль (например, 1234)">
                <button id="main-btn" class="btn-primary">ВОЙТИ</button>
            </div>
            
            <p class="toggle-mode">
                <span id="toggle-text">Нет аккаунта?</span> 
                <span id="toggle-link">Зарегистрироваться</span>
            </p>
        </div>
    </div>

    <div id="chat" style="display: none;">
        <div class="app-container">
            <div class="sidebar">
                <div class="sidebar-header">BlueWave</div>
                <div id="user-list"></div>
            </div>
            <div class="chat-main">
                <div class="chat-header">
                    <span id="target-user">Общий чат</span>
                    <button id="callBtn" class="call-action-btn">📞 Позвонить</button>
                </div>
                <div id="messages"></div>
                <div class="message-input-area">
                    <input type="text" id="msg-input" placeholder="Введите сообщение...">
                    <button id="send-btn">Отправить</button>
                </div>
            </div>
        </div>
    </div>

    <div id="video-container">
        <video id="remote-video" autoplay playsinline></video>
        <video id="local-video" autoplay muted playsinline></video>
        <div class="video-ui">
            <button id="hangup-btn" class="hangup-btn">Завершить звонок</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
