<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlueWave Messenger</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="auth">
        <div class="login-card">
            <div class="avatar-container">
                <div class="blue-icon-box"><img src="logo.png" alt="Ship"></div>
            </div>
            <h1 class="brand-name">BlueWave</h1>
            <p class="welcome-text">Добро пожаловать</p>
            <div class="auth-fields">
                <input type="text" id="username" placeholder="Логин">
                <input type="password" id="password" placeholder="Пароль">
                <button id="main-btn" class="btn-primary">ВОЙТИ</button>
            </div>
            <p class="toggle-mode"><span id="toggle-link">Зарегистрироваться</span></p>
        </div>
    </div>

    <div id="chat" style="display: none;">
        <div class="app-container">
            <div class="sidebar">
                <div class="sidebar-header">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                        <h3>BlueWave</h3>
                        <div id="settings-btn" style="cursor: pointer; font-size: 20px;">⚙️</div>
                    </div>
                    <div id="my-id-display">Ваш ID: ...</div>
                    <input type="text" id="search-input" placeholder="Поиск в контактах...">
                </div>
                
                <div class="section-title">Группы</div>
                <div class="user-item group-item" id="global-group">
                    <div class="mini-cube" style="background: #00c853;"></div> 
                    <span>BlueWave Group</span>
                </div>

                <div class="section-title">Контакты</div>
                <div id="user-list"></div>
            </div>

            <div class="chat-main">
                <div class="chat-header">
                    <span id="target-user-name">Выберите чат</span>
                </div>
                <div id="messages">
                    <div id="chat-welcome">Выберите чат, чтобы начать общение</div>
                </div>
                <div class="message-input-area" id="input-panel" style="display: none;">
                    <input type="text" id="msg-input" placeholder="Введите сообщение...">
                    <button id="send-btn">Отправить</button>
                </div>
            </div>
        </div>
    </div>

    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <h4>Настройки</h4>
            <p style="font-size: 13px; color: #666; margin: 10px 0;">Добавить пользователя по ID:</p>
            <input type="text" id="add-user-id" placeholder="Введите 6-значный ID...">
            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <button id="confirm-add-btn" class="btn-primary" style="margin:0;">Добавить</button>
                <button id="close-settings" class="btn-primary" style="margin:0; background:#ccc;">Закрыть</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
