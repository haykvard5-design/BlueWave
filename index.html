<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlueWave</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="auth">
        <div class="login-container">
            <img src="logo.png" class="ship-img" alt="BlueWave">
            
            <div class="auth-box">
                <h2 class="brand">BlueWave</h2>
                <div class="input-group">
                    <input type="text" id="username" placeholder="Логин">
                    <input type="password" id="password" placeholder="Пароль">
                </div>
                <button class="btn-login" onclick="login()">ВОЙТИ</button>
                <a href="#" class="btn-reg">Создать аккаунт</a>
            </div>
        </div>
    </div>

    <div id="chat" style="display: none;">
        <div class="messenger">
            <aside class="sidebar">
                <div class="header">Чаты</div>
                <div id="userList"></div>
            </aside>
            <main class="chat-area">
                <header class="chat-header">
                    <span id="chatTitle">Выберите чат</span>
                    <button id="callBtn" onclick="startCall()" style="display:none;">📞</button>
                </header>
                <div id="messages"></div>
                <div class="input-bar">
                    <input type="file" id="imageInput" accept="image/*" hidden onchange="sendImage()">
                    <button class="action-btn" onclick="document.getElementById('imageInput').click()">📎</button>
                    <input type="text" id="msgInput" placeholder="Сообщение...">
                    <button class="action-btn send" onclick="send()">➤</button>
                </div>
            </main>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
