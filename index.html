<div class="login-card" id="auth-screen">
    <div class="logo-box">
        <img src="logo.png" alt="BlueWave Logo">
    </div>
    <h2>BlueWave</h2>
    <p class="welcome-text">Добро пожаловать в будущее общения</p>
    
    <input type="text" id="username" placeholder="Имя пользователя">
    <input type="password" id="password" placeholder="Пароль">
    
    <button class="btn-primary" id="loginBtn">Войти / Регистрация</button>
</div>

<div id="chat" style="display: none;">
    <div id="messages"></div>
    <div class="input-area">
        <input type="text" id="messageInput" placeholder="Напишите сообщение...">
        <button class="btn-primary" style="width: auto;">Отправить</button>
    </div>
</div>
