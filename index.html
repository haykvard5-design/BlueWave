<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlueWave Messenger</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="auth">
        <div class="login-card">
            <div class="avatar-container">
                <div class="blue-icon-box"><img src="logo.png" alt="Ship"></div>
            </div>
            <h1 class="brand-name">BlueWave</h1>
            <p class="welcome-text" id="form-subtitle">Добро пожаловать в мессенджер</p>
            <div class="auth-fields">
                <input type="text" id="username" placeholder="Логин" autocomplete="off">
                <input type="password" id="password" placeholder="Пароль">
                <button id="main-btn" class="btn-primary">ВОЙТИ</button>
            </div>
            <p class="toggle-mode">
                <span id="toggle-text">Нет аккаунта?</span> 
                <span id="toggle-link">Зарегистрироваться</span>
            </p>
        </div>
    </div>

    <div id="chat" style="display: none;">
        <div class="app-container">
            <div class="sidebar">
                <div class="sidebar-header">
                    <h3>BlueWave</h3>
                    <div id="my-id-display">Ваш ID: ...</div>
                    <input type="text" id="search-input" placeholder="Поиск по ID...">
                </div>
                
                <div class="section-title">Группы</div>
                <div id="group-list">
                    <div class="user-item group-item" id="global-group">
                        <div class="mini-cube" style="background: #00c853;"></div> 
                        <span>BlueWave Group</span>
                    </div>
                </div>

                <div class="section-title">Личные сообщения</div>
                <div id="user-list"></div>
            </div>

            <div class="chat-main">
                <div class="chat-header">
                    <span id="target-user-name">Выберите чат</span>
                    <button id="callBtn" style="display: none;">📞</button>
                </div>
                
                <div id="messages">
                    <div id="chat-welcome">
                        <p>Выберите чат, чтобы начать общение</p>
                    </div>
                </div>

                <div class="message-input-area" id="input-panel" style="display: none;">
                    <input type="text" id="msg-input" placeholder="Введите сообщение...">
                    <button id="send-btn">Отправить</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
