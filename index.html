<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlueWave Messenger</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="auth-screen">
        <div class="login-container">
            <img src="logo.png" alt="BlueWave Ship" class="ship-img">
            <div class="auth-box">
                <input type="text" id="username" placeholder="Введите имя..." autocomplete="off">
                <button id="login-btn">Войти</button>
            </div>
        </div>
    </div>

    <div id="chat-screen" style="display: none;">
        <div class="sidebar">
            <h2>BlueWave</h2>
            <div id="user-list"></div>
        </div>
        <div class="main-chat">
            <div id="video-grid">
                <video id="local-video" autoplay muted playsinline></video>
                <video id="remote-video" autoplay playsinline></video>
            </div>
            <div id="messages"></div>
            <div class="input-area">
                <input type="text" id="msg-input" placeholder="Сообщение...">
                <button id="send-btn">Send</button>
                <button id="call-btn">📞</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
